<!DOCTYPE html>
<html>
    <head>
        <title>委員会管理ツール</title>
        <meta charset="utf-8">
        <script src="main.js" defer></script>
        <link href="main.css" rel="stylesheet">
        <link href="mycom.css" rel="stylesheet">
    </head>
    <body>
        <div class="selectBtn top" id="my_com">
            <img src="image.gif" class="image">
            <h1 class="title">自分の委員会</h1>
        </div>
        <div class="top container">
            <div class="selectBtn other left" id="gakkyu">
                <h1 class="title">学級委員会</h1>
            </div>
            <div class="selectBtn other right" id="seikatu">
                <h1 class="title">生活委員会</h1>
            </div>
        </div>
        <div class="top container">
            <div class="selectBtn other left" id="tosho">
                <h1 class="title">図書委員会</h1>
            </div>
            <div class="selectBtn other right" id="bunka">
                <h1 class="title">文化委員会</h1>
            </div>
        </div>
        <div class="top container">
            <div class="selectBtn other left" id="kyuushoku">
                <h1 class="title">給食委員会</h1>
            </div>
            <div class="selectBtn other right" id="hobi">
                <h1 class="title">保健美化委員会</h1>
            </div>
        </div>
        <div class="selectBtn top" id="ask">
            <h1 class="title">生徒会活動全体へのご意見</h1>
        </div>
        <dialog id="ask-modal">
            <header></header>
            <form></form>
        </dialog>
    </body>
</html>
